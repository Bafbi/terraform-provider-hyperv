[tools]
go = "1.25"
"go:golang.org/x/tools/gopls" = "latest"
"aqua:golangci-lint" = "v2.11.3"
terraform = "latest"

[env]
_.file = ".env"

TF_CLI_CONFIG_FILE = ".terraformrc"

[prepare.go]
auto = true

[prepare."terraformrc"]
description = "Generate .terraformrc from template"
sources = [".terraformrc.tpl"]
outputs = [".terraformrc"]
run = '''
#!/bin/bash
sed "s|__GOBIN__|$(go env GOBIN)|g" .terraformrc.tpl > .terraformrc  
'''

[tasks.build]
description = "Build the provider binary"
run = "go build -o terraform-provider-hyperv"

[tasks.install]
description = "Build and install the provider"
run = "go install ."
depends = ["build"]
  
[tasks.test]
description = "Run unit tests"
depends = ["go:format"]
run = "go test ./... -v -short -timeout 10m"

[tasks.testacc]
description = "Run acceptance tests"
depends = ["test"]
env = { TF_ACC = "1" }
run = "go test ./... -v -tags=integration -timeout 120m"

[tasks."go:format"]
description = "Format Go and Terraform code"
run = """
golangci-lint fmt
"""

[tasks."example:format"]
description = "Format example code"
run = "terraform fmt -recursive ./examples/"

[tasks.lint]
description = "Run linter"
run = "golangci-lint run"

[tasks."docs:generate"]
description = "Generate documentation"
run = "go generate ./..."

[tasks.clean]
description = "Clean build artifacts"
run = """
rm -f terraform-provider-hyperv
go clean
"""

[tasks."dev:plan"]
description = "Run terraform plan in dev directory"
run = "terraform -chdir=dev plan"
depends = ["install"]

[tasks."dev:apply"]
description = "Run terraform apply in dev directory"
run = "terraform -chdir=dev apply"
depends = ["install"]

[tasks."dev:destroy"]
description = "Run terraform destroy in dev directory"
run = "terraform -chdir=dev destroy"

[tasks.verify]
description = "Verify the installation"
run = """
echo "Checking provider binary..."
ls -lh ~/.local/share/mise/installs/go/*/bin/terraform-provider-hyperv || echo "Provider not installed"
echo ""
echo "Environment variables:"
echo "  TF_CLI_CONFIG_FILE=$TF_CLI_CONFIG_FILE"
"""
